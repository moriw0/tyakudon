<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>待機中 - 着丼</title>
  <link rel="stylesheet" href="base.css">
</head>
<body>

<p><a href="#">着丼</a> - 待機中</p>
<hr>

<h1>ラーメン二郎 三田本店</h1>

<table>
  <tr><th class="col-th">店舗</th><td><a href="#">ラーメン二郎 三田本店</a></td></tr>
  <tr><th class="col-th">開始時刻</th><td>14:09</td></tr>
  <tr><th class="col-th">経過時間</th><td><code>23:47</code></td></tr>
</table>

<p><a href="#" class="btn btn-block">着丼！（計測を完了する）</a></p>
<p><a href="#">リタイアする（記録を中止する）</a></p>

<hr>

<h2>応援メッセージ</h2>
<p>「列は確実に進んでいる。ニンニクの量を今のうちに決めておけ。あとちょっとだ。」</p>

<hr>

<h2>行列の様子 <button class="btn" style="font-size: 13px; padding: 3px 10px;" onclick="openModal()">追加報告</button></h2>

<table>
  <thead>
    <tr>
      <th>時刻</th>
      <th>状況</th>
      <th>行列数</th>
      <th class="col-comment">ひとこと</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>14:32</td>
      <td>店外</td>
      <td>8人</td>
      <td class="col-comment">角まで列が続いてる</td>
    </tr>
  </tbody>
</table>

<hr>
<p><small>着丼 - ラーメン待ち時間記録システム</small></p>

<!-- オーバーレイ -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>

<!-- 追加報告モーダル -->
<div class="modal" id="modal" style="display: none;">
  <p>
    <strong>追加報告</strong> — ラーメン二郎 三田本店<br>
    <a href="#" onclick="closeModal(); return false;">× 閉じる</a>
  </p>
  <hr>
  <form action="#" method="post" enctype="multipart/form-data">
    <p>
      <strong>接続先</strong><br>
      <small>今どこにいますか？</small><br>
      <label><input type="radio" name="location" value="outside" checked> 店外（行列中）</label>
      <label><input type="radio" name="location" value="inside"> 店内（待ち席）</label>
      <label><input type="radio" name="location" value="seated"> 着席済み</label>
    </p>
    <p>
      <label for="queue_count"><strong>待ち行列数</strong></label><br>
      <small>あなたの前に何人いますか？（わからなければ空欄で）</small><br>
      <input type="number" id="queue_count" name="queue_count" min="0" max="999" placeholder="例: 8" style="width: 120px;">
      <span> 人</span>
    </p>
    <p>
      <label for="comment"><strong>ひとこと</strong></label><br>
      <textarea id="comment" name="comment" placeholder="行列の様子や心境をどうぞ！"></textarea>
    </p>
    <p>
      <label for="photo"><strong>写真</strong>（任意）</label><br>
      <input type="file" id="photo" name="photo" accept="image/*">
    </p>
    <p><button type="submit" class="btn btn-block">報告する</button></p>
  </form>
</div>

<script>
  function openModal() {
    document.getElementById('overlay').classList.add('active');
    document.getElementById('modal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('modal').style.display = 'none';
    document.body.style.overflow = '';
  }
</script>

</body>
</html>
